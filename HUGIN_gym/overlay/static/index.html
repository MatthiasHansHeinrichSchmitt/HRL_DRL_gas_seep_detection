<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overlay Visualizer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 20px;
        }
        iframe {
            border: none;
            width: 100%;
            height: 600px;
        }
    </style>
</head>
<body>
    <div id="overlay">
        <iframe id="meshcat-iframe" src="" width="800" height="600"></iframe>
    </div>

    <script>
        // Make an AJAX request to get the MeshCat URL dynamically
        fetch('/bars')
            .then(response => response.json())
            .then(data => {
                const meshcatUrl = data.meshcat_url;  // Assuming the response has this key
                document.getElementById('meshcat-iframe').src = meshcatUrl;
            })
            .catch(err => {
                console.error('Error fetching the MeshCat URL:', err);
            });
    </script>
</body>
</html>
